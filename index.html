<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">光伏与储能配置计算器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.js"></script>
<script src="./docx.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#F5F6F8;color:#1a1a1a;font-size:14px;line-height:1.6}
header{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:10}
header h1{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.2}
header .sub{font-size:11px;color:#aaa}
.lang-switch{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden}
.lang-btn{padding:4px 12px;font-size:12px;border:none;background:#fff;color:#666;cursor:pointer;transition:all .12s}
.lang-btn.active{background:#1D9E75;color:#fff;font-weight:600}
.main{max-width:1100px;margin:0 auto;padding:1.25rem 1rem;display:grid;grid-template-columns:1fr 380px;gap:1.1rem;align-items:start}
.left{display:flex;flex-direction:column;gap:1rem}
.right{display:flex;flex-direction:column;gap:1rem;position:sticky;top:66px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.1rem 1.25rem}
.card-title{font-size:13.5px;font-weight:600;color:#1a1a1a;margin-bottom:.9rem;display:flex;align-items:center;gap:7px}
.card-title i{font-size:17px;color:#1D9E75}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem}
.cat-btn{font-size:12px;padding:4px 11px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s}
.cat-btn.active{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}
.cat-btn:hover{border-color:#1D9E75;color:#0F6E56}
.ap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px}
.ap-card{border:1px solid #e8e8e8;border-radius:8px;padding:9px;cursor:pointer;transition:all .15s;background:#fafafa;user-select:none}
.ap-card:hover{border-color:#1D9E75;background:#E1F5EE;transform:translateY(-1px)}
.ap-card .ap-name{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.ap-card .ap-power{font-size:11px;color:#1D9E75;margin-top:2px;font-weight:500}
.ap-card .ap-hours{font-size:10px;color:#888;margin-top:1px}
.ap-card .ap-note{font-size:10px;color:#aaa;margin-top:1px}
.load-hdr{display:grid;grid-template-columns:1fr 60px 42px 52px 56px 26px;gap:5px;margin-bottom:5px;padding:0 4px}
.load-hdr span{font-size:11px;color:#999;text-align:center}
.load-hdr span:first-child{text-align:left}
.load-row{display:grid;grid-template-columns:1fr 60px 42px 52px 56px 26px;gap:5px;align-items:center;padding:4px;border-radius:6px}
.load-row:hover{background:#f5f5f5}
.load-row .dev-name{font-size:12px;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.load-row input{width:100%;font-size:12px;text-align:center;padding:3px 4px;border:1px solid #e0e0e0;border-radius:5px;background:#fff;color:#1a1a1a}
.load-row input:focus{outline:none;border-color:#1D9E75}
.del-btn{background:transparent;border:none;cursor:pointer;color:#ccc;font-size:14px;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px}
.del-btn:hover{background:#FEE;color:#E24B4A}
.empty-msg{text-align:center;color:#bbb;padding:1.5rem;font-size:13px}
.daily-kwh{text-align:right;font-size:12px;color:#888;margin-top:7px;padding-top:7px;border-top:1px dashed #eee}
.daily-kwh strong{color:#1D9E75;font-size:14px}
.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.param-item label{font-size:11px;color:#888;display:block;margin-bottom:3px}
select,input[type=text]{width:100%;padding:6px 8px;font-size:12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a}
select:focus,input[type=text]:focus{outline:none;border-color:#1D9E75}
.location-box{background:#F8FFFE;border:1px solid #C5ECD9;border-radius:10px;padding:.9rem;margin-bottom:.8rem}
.loc-title{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.search-row{display:flex;gap:6px}
.search-row input{flex:1}
.search-btn{padding:6px 13px;font-size:12px;background:#1D9E75;color:#fff;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.search-btn:hover{background:#0F6E56}
.search-btn:disabled{background:#aaa;cursor:not-allowed}
.psh-result{margin-top:.7rem;font-size:12px}
.psh-badge{display:inline-flex;align-items:center;gap:6px;background:#E1F5EE;border:1px solid #9FE1CB;border-radius:6px;padding:4px 9px;font-size:12px;color:#085041}
.psh-badge strong{font-size:14px;color:#0F6E56}
.psh-monthly{margin-top:7px}
.month-bars{display:flex;gap:3px;align-items:flex-end;height:46px;margin-top:4px}
.month-bar{flex:1;background:#1D9E75;border-radius:2px 2px 0 0;opacity:.7;position:relative;cursor:default}
.month-bar:hover{opacity:1}
.month-bar .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;display:none;margin-bottom:3px}
.month-bar:hover .tip{display:block}
.month-labels{display:flex;gap:3px;margin-top:2px}
.month-labels span{flex:1;text-align:center;font-size:9px;color:#aaa}
.loc-status{font-size:11px;color:#aaa;margin-top:4px}
.loc-status.loading{color:#1D9E75}
.loc-status.error{color:#E24B4A}
.psh-source-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.src-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .12s}
.src-btn.active{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}
.result-metrics{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.7rem}
.metric{background:#F0FBF6;border-radius:8px;padding:.8rem .9rem;border:1px solid #C5ECD9}
.metric .lbl{font-size:11px;color:#666;margin-bottom:3px}
.metric .val{font-size:19px;font-weight:700;color:#0F6E56}
.metric .unit{font-size:11px;color:#888;margin-left:3px;font-weight:400}
.metric.gray{background:#F8F8F8;border-color:#E8E8E8}
.metric.gray .val{color:#444}
.detail-table{width:100%;border-collapse:collapse;margin-top:.4rem}
.detail-table td{font-size:12px;padding:4px 0;border-bottom:1px solid #F0F0F0;color:#444}
.detail-table td:last-child{text-align:right;font-weight:500;color:#1a1a1a}
.detail-table tr:last-child td{border:none;color:#0F6E56;font-weight:600}
.section-title{font-size:12px;font-weight:600;color:#555;margin:9px 0 5px;display:flex;align-items:center;gap:5px}
.calc-btn{width:100%;padding:11px;font-size:14px;font-weight:600;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:.8rem}
.calc-btn:hover{background:#0F6E56;transform:translateY(-1px)}
.note{font-size:11px;color:#bbb;margin-top:.7rem;padding-top:.7rem;border-top:1px solid #F0F0F0;line-height:1.8}
.placeholder-result{text-align:center;padding:1.75rem;color:#ccc;font-size:13px}
.nasa-tag{font-size:10px;background:#E8F4FD;color:#185FA5;border:1px solid #B5D4F4;border-radius:4px;padding:1px 6px;display:inline-block}
.sim-main{padding-top:0}
.sim-card{grid-column:1/-1}
.sim-sub{font-size:11px;color:#aaa;font-weight:400;margin-left:6px}
.sim-hero{background:linear-gradient(120deg,#1D9E75 0%,#15875F 100%);color:#fff;border-radius:12px;padding:1rem 1.2rem;margin-bottom:.9rem;font-size:13.5px;line-height:1.7;box-shadow:0 4px 14px rgba(29,158,117,.18)}
.sim-hero b{color:#FFE08A}
.sim-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:1rem}
.sim-stat{position:relative;background:#fff;border:1px solid #E6ECE8;border-radius:12px;padding:.85rem .9rem;overflow:hidden}
.sim-stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#1D9E75}
.sim-stat.s-pv::before{background:#EF9F27}
.sim-stat.s-self::before{background:#1D9E75}
.sim-stat.s-suff::before{background:#185FA5}
.sim-stat.s-co2::before{background:#3FB984}
.sim-stat .st-ico{font-size:17px;color:#9aa6a0;margin-bottom:3px}
.sim-stat .st-lbl{font-size:11px;color:#6a7670;margin-bottom:2px}
.sim-stat .st-val{font-size:22px;font-weight:800;color:#16201b;letter-spacing:-.5px;line-height:1.1}
.sim-stat .st-val .u{font-size:11px;font-weight:600;color:#8a948e;margin-left:2px}
.sim-stat .st-foot{font-size:10px;color:#a6b0aa;margin-top:2px}
.sim-chart-card{border:1px solid #E9EDEB;border-radius:14px;padding:.9rem 1rem;background:#fff}
.sim-chart-box{position:relative;height:400px;width:100%}
.sim-caption{margin-top:.65rem;font-size:11px;color:#7a847e;line-height:1.7;background:#F7FAF8;border-radius:8px;padding:.55rem .75rem}
.sim-caption .leg{display:inline-flex;align-items:center;gap:4px;margin-right:12px;white-space:nowrap}
.sim-caption .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.sim-internal{margin-top:.9rem;border:1px dashed #d8ddd9;border-radius:10px;background:#FCFCFB}
.sim-internal summary{cursor:pointer;padding:.65rem .85rem;font-size:12px;font-weight:600;color:#6a7670;list-style:none;user-select:none}
.sim-internal summary::-webkit-details-marker{display:none}
.sim-internal[open] summary{border-bottom:1px dashed #e3e7e3}
.sim-advice{margin:.55rem .85rem 0;font-size:12px;line-height:1.75;color:#384038}
.sim-advice b{color:#0F6E56}
.sim-advice .adv-title{font-weight:600;color:#0F6E56;display:flex;align-items:center;gap:5px;margin-bottom:4px}
.sim-internal .note{margin:.55rem .85rem .85rem}
.sim-loading{text-align:center;color:#1D9E75;padding:2rem;font-size:13px}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.export-row{margin-top:1.1rem;display:flex;align-items:center;gap:10px;justify-content:center}
.export-btn{padding:11px 28px;font-size:13.5px;font-weight:600;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;box-shadow:0 3px 10px rgba(24,95,165,.25)}
.export-btn:hover{background:#0E4A85;transform:translateY(-1px)}
.export-btn:disabled{background:#aaa;cursor:not-allowed;transform:none}
.export-note{font-size:11px;color:#aaa}
@media(max-width:700px){
  .sim-stats{grid-template-columns:repeat(2,1fr)}
  .sim-chart-box{height:300px}
  .main{grid-template-columns:1fr}
  .right{position:static}
  .ap-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <img id="hLogo" src="logo.png" alt="MIDFINE" style="height:30px;object-fit:contain">
    <div>
      <h1 id="hTitle">光伏与储能配置计算器</h1>
      <div class="sub" id="hSub">v3.1 · 业务员专用工具</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="lang-switch">
      <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    </div>
    <div style="font-size:12px;color:#bbb">MIDFINE Energy</div>
  </div>
</header>

<div class="main">
  <div class="left">

    <div class="card">
      <div class="card-title"><i class="ti ti-building-community"></i><span data-k="projectInfo">项目信息</span></div>
      <div class="param-item">
        <label data-k="customerName">客户名称</label>
        <input type="text" id="customerName" placeholder="公司 / 客户名称">
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-bolt"></i><span data-k="selectLoad">选择负载设备</span></div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="ap-grid" id="apGrid"></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-list-details"></i><span data-k="loadList">负载清单</span></div>
      <div id="loadEmpty" class="empty-msg"><i class="ti ti-click" style="font-size:22px;display:block;margin-bottom:7px"></i><span data-k="loadHint">点击上方电器卡片添加设备</span></div>
      <div id="loadTable" style="display:none">
        <div class="load-hdr">
          <span data-k="devName">设备名称</span><span data-k="power">功率(W)</span><span data-k="qty">数量</span><span data-k="startH">起始(时)</span><span data-k="durH">时长(h)</span><span></span>
        </div>
        <div id="loadList"></div>
        <div class="daily-kwh"><span data-k="totalDaily">日用电量合计：</span><strong id="totalKwh">0</strong> kWh/<span data-k="day">天</span></div>
      </div>
    </div>

  </div>

  <div class="right">

    <div class="card">
      <div class="card-title"><i class="ti ti-adjustments-horizontal"></i><span data-k="sysParams">系统参数</span></div>

      <div class="location-box">
        <div class="loc-title"><i class="ti ti-satellite" style="font-size:14px"></i><span data-k="nasaTitle">NASA POWER 实时日照数据</span></div>
        <div class="search-row">
          <input type="text" id="locInput" placeholder="输入地名，如：三亚、拉萨…" onkeydown="if(event.key==='Enter')fetchNASA()">
          <button class="search-btn" id="searchBtn" onclick="fetchNASA()"><i class="ti ti-search" style="font-size:12px"></i><span data-k="search">查询</span></button>
        </div>
        <div id="locStatus" class="loc-status"></div>
        <div id="pshResult" style="display:none" class="psh-result">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="psh-badge"><i class="ti ti-sun" style="font-size:13px"></i><span data-k="annualPsh">年均峰值日照</span> <strong id="pshVal">-</strong> h/<span data-k="day2">天</span></div>
            <span class="nasa-tag">NASA POWER</span>
            <span id="coordInfo" style="font-size:11px;color:#aaa"></span>
          </div>
          <div class="psh-monthly" id="pshMonthly"></div>
        </div>
      </div>

      <div class="param-item" style="margin-bottom:.75rem">
        <label data-k="pshSrc">峰值日照时数来源</label>
        <div class="psh-source-row" style="margin-top:4px">
          <button class="src-btn active" id="srcNasa" onclick="setSrc('nasa')"><i class="ti ti-satellite" style="font-size:11px;vertical-align:-1px"></i> NASA</button>
          <button class="src-btn" id="srcManual" onclick="setSrc('manual')"><i class="ti ti-pencil" style="font-size:11px;vertical-align:-1px"></i> <span data-k="manual">手动选择城市</span></button>
        </div>
        <div id="nasaPshRow" style="font-size:12px;color:#888;padding:3px 2px"><span data-k="nasaHint">请先查询地点获取 NASA 日照数据</span></div>
        <div id="manualPshRow" style="display:none"><select id="citySelect"></select></div>
      </div>

      <div class="param-grid">
        <div class="param-item">
          <label data-k="autonomy">自给天数</label>
          <select id="autonomy">
            <option value="1" selected data-k-opt="auto1">1天（并网+储能）</option>
            <option value="2" data-k-opt="auto2">2天（住宅离网）</option>
            <option value="3" data-k-opt="auto3">3天（商业离网）</option>
            <option value="5" data-k-opt="auto5">5天（偏远地区）</option>
          </select>
        </div>
        <div class="param-item">
          <label data-k="batLabel">电池类型（磷酸铁锂）</label>
          <select id="batType">
            <option value="0.80" selected>LFP DoD 80%</option>
            <option value="0.85">LFP DoD 85%</option>
            <option value="0.90">LFP DoD 90%</option>
          </select>
        </div>
        <div class="param-item">
          <label data-k="panelLabel">组件规格</label>
          <select id="panelSpec">
            <option value="0.59">590W</option><option value="0.615">615W</option>
            <option value="0.62">620W</option><option value="0.63">630W</option>
            <option value="0.64" selected>640W</option><option value="0.65">650W</option>
            <option value="0.70">700W</option><option value="0.71">710W</option>
            <option value="0.72">720W</option><option value="0.73">730W</option>
          </select>
        </div>
        <div class="param-item">
          <label data-k="sysEff">系统效率</label>
          <select id="sysEff">
            <option value="0.75">75%</option><option value="0.80">80%</option>
            <option value="0.82">82%</option><option value="0.85" selected>85%（推荐）</option>
          </select>
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">
        <i class="ti ti-calculator"></i><span data-k="calcBtn">计算配置方案</span>
      </button>
    </div>

    <div class="card" id="resultCard">
      <div class="card-title"><i class="ti ti-report-analytics"></i><span data-k="result">配置结果</span></div>
      <div id="resultInner"><div class="placeholder-result"><i class="ti ti-arrow-up" style="font-size:19px;display:block;margin-bottom:5px"></i><span data-k="resultHint">填写负载后点击计算</span></div></div>
    </div>

  </div>
</div>

<div class="main sim-main">
  <div class="card sim-card">
    <div class="card-title">
      <i class="ti ti-sun-high"></i><span data-k="simTitle">光伏储能系统 · 全天发用电模拟</span>
      <span class="sim-sub" id="simSub"></span>
    </div>

    <div id="simEmpty" class="placeholder-result">
      <i class="ti ti-chart-area-line" style="font-size:21px;display:block;margin-bottom:5px"></i>
      <span data-k="simHint">先在右侧完成配置计算，系统将生成全天运行曲线</span>
    </div>

    <div id="simBody" style="display:none">
      <div id="simHero" class="sim-hero"></div>
      <div id="simStats" class="sim-stats"></div>
      <div class="sim-chart-card">
        <div class="sim-chart-box"><canvas id="simChart"></canvas></div>
        <div class="sim-caption" id="simCaption"></div>
      </div>
      <div class="export-row" id="exportRow">
        <button class="export-btn" id="exportBtn" onclick="exportReport()">
          <i class="ti ti-file-word"></i><span data-k="exportBtn">导出 Word 方案书</span>
        </button>
        <span class="export-note" data-k="exportNote">包含负载清单、配置参数、能量曲线图及空白报价表</span>
      </div>
      <details class="sim-internal">
        <summary><i class="ti ti-briefcase"></i> <span data-k="internalRef">销售内部参考（点击展开）</span></summary>
        <div id="simAdvice" class="sim-advice"></div>
        <p class="note" id="simNote"></p>
      </details>
    </div>
  </div>

async function fetchNASA(){
  const q=document.getElementById('locInput').value.trim();
  if(!q){setStatus(lang==='zh'?'请输入地名':'Please enter a location','error');return;}
  const btn=document.getElementById('searchBtn');btn.disabled=true;
  setStatus(lang==='zh'?'正在查询坐标...':'Searching coordinates...','loading');
  document.getElementById('pshResult').style.display='none';
  try{
    const geoRes=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1&accept-language=zh',{headers:{'User-Agent':'PV-Calculator/3.1'}});
    const geoData=await geoRes.json();
    if(!geoData.length){setStatus(lang==='zh'?'未找到该地点':'Location not found','error');btn.disabled=false;return;}
    const latF=parseFloat(geoData[0].lat).toFixed(4),lonF=parseFloat(geoData[0].lon).toFixed(4);
    nasaLocationName=q;nasaLat=parseFloat(latF);nasaLon=parseFloat(lonF);
    setStatus((lang==='zh'?'坐标：':'Coordinates: ')+latF+'°N, '+lonF+'°E · '+(lang==='zh'?'正在请求 NASA POWER…':'Fetching NASA POWER…'),'loading');
    const nasaUrl='https://power.larc.nasa.gov/api/temporal/climatology/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude='+lonF+'&latitude='+latF+'&format=JSON';
    const nasaData=await (await fetch(nasaUrl)).json();
    const monthly=nasaData.properties.parameter.ALLSKY_SFC_SW_DWN;
    const vals=Object.entries(monthly).filter(([k])=>k!=='ANN').map(([,v])=>parseFloat(v));
    nasaPsh=parseFloat(parseFloat(monthly['ANN']).toFixed(2));nasaMonthly=vals;
    document.getElementById('pshVal').textContent=nasaPsh;
    document.getElementById('coordInfo').textContent=latF+'°N, '+lonF+'°E';
    renderMonthlyBars(vals);
    document.getElementById('pshResult').style.display='';
    document.getElementById('nasaPshRow').innerHTML='<span style="color:#0F6E56;font-weight:600">'+nasaPsh+' h/day</span> <span class="nasa-tag">NASA POWER · '+q+'</span>';
    setStatus('','');
  }catch(e){setStatus(lang==='zh'?'查询失败，请检查网络':'Query failed, check network','error');console.error(e);}
  btn.disabled=false;
}

async function getPvShape(refetch){
  if(pshSource==='nasa'&&nasaLat!=null){
    const key=nasaLat.toFixed(2)+','+nasaLon.toFixed(2);
    if(refetch||!hourlyShapeCache[key]){
      const em=document.getElementById('simEmpty');em.style.display='';
      em.innerHTML='<div class="sim-loading"><i class="ti ti-loader-2 spin"></i> '+(lang==='zh'?'正在获取 NASA POWER 逐时数据…':'Fetching NASA POWER hourly data…')+'</div>';
      document.getElementById('simBody').style.display='none';
    }
    const s=await fetchHourlyShape(nasaLat,nasaLon);
    if(s)return{shape:s,src:'NASA POWER Hourly · '+nasaLocationName};
    return{shape:sinePVShape(),src:'Theoretical Sine Model (NASA hourly unavailable)'};
  }
  return{shape:sinePVShape(),src:'Theoretical Sine Model'};
}

const INV_LADDER=[3,5,6,8,10,12,15,18,20,25,30,40,50,60,70,80,100,125];
function chooseInverter(req){if(req<=0)return{unit:0,count:0,total:0,text:'—'};if(req<=125){const s=INV_LADDER.find(v=>v>=req);return{unit:s,count:1,total:s,text:s+' kVA'};}const count=Math.ceil(req/125);return{unit:125,count,total:125*count,text:count+' × 125 kVA = '+(125*count)+' kVA'};}
const BAT_MODULES=[5,10,16];
function chooseBattery(req){if(req<=0)return{unit:0,count:0,total:0,text:'No battery needed'};let best=null;BAT_MODULES.forEach(M=>{const N=Math.ceil(req/M),total=N*M;if(!best||total<best.total||(total===best.total&&N<best.count))best={unit:M,count:N,total};});best.text=best.count+' × '+best.unit+' kWh = '+best.total+' kWh';return best;}

async function calculate(opts){
  opts=opts||{};const silent=!!opts.silent;
  if(!loads.length){if(!silent)alert(t('noCalcAlert'));return;}
  const psh=getActivePsh();
  if(!psh){if(!silent)alert(lang==='zh'?'请先查询 NASA 日照数据':'Please query NASA irradiance first');return;}
  const autonomy=+document.getElementById('autonomy').value;
  const dod=+document.getElementById('batType').value;
  const panelUnit=+document.getElementById('panelSpec').value;
  const EFF=+document.getElementById('sysEff').value;
  const BAT_EFF=0.95;
  const dailyKwh=getDailyKwh();
  const pvReq=dailyKwh/(psh*EFF);
  const pvPanels=Math.ceil(pvReq/panelUnit);
  const pvActual=pvPanels*panelUnit;
  const peakKw=loads.reduce((s,l)=>s+l.power*(l.qty||1),0)/1000;
  const invReq=peakKw/0.9;
  const inv=chooseInverter(invReq);
  const invKva=inv.total;
  const E_pv=pvActual*psh*EFF;
  const shapeRes=await getPvShape(opts.refetch);
  const shape=shapeRes.shape,shapeSrc=shapeRes.src;
  const pv=shape.map(f=>f*E_pv);
  const load=buildLoadCurve(loads);
  let pvDirectKwh=0,deficitKwh=0;
  for(let h=0;h<24;h++){pvDirectKwh+=Math.min(pv[h],load[h]);deficitKwh+=Math.max(0,load[h]-pv[h]);}
  const pvDirectRatio=dailyKwh>0?pvDirectKwh/dailyKwh:0;
  const batEnergyReq=deficitKwh+dailyKwh*(autonomy-1);
  const batReq=batEnergyReq/(dod*BAT_EFF);
  const bat=chooseBattery(batReq);
  const batActual=bat.total;
  const pvSavePct=(pvDirectRatio*100).toFixed(0);
  const label=getActivePshLabel();
  const isEn=lang==='en';
  const nasaNote=(pshSource==='nasa'&&nasaMonthly)
    ?(isEn?'Worst month: '+Math.min(...nasaMonthly).toFixed(1)+'h/day ('+MONTHS_EN[nasaMonthly.indexOf(Math.min(...nasaMonthly))]+'), Best: '+Math.max(...nasaMonthly).toFixed(1)+'h/day ('+MONTHS_EN[nasaMonthly.indexOf(Math.max(...nasaMonthly))]+').':'最差月份 '+Math.min(...nasaMonthly).toFixed(1)+'h/天（'+MONTHS[nasaMonthly.indexOf(Math.min(...nasaMonthly))]+'），最佳 '+Math.max(...nasaMonthly).toFixed(1)+'h/天（'+MONTHS[nasaMonthly.indexOf(Math.max(...nasaMonthly))]+'）。'):'';
  const batDesc=autonomy>1?(isEn?'Energy req (deficit + '+(autonomy-1)+' backup days)':'总储量（当天缺口+'+(autonomy-1)+'天备电）'):(isEn?'Energy req (cover daily deficit)':'总储量（覆盖当天缺口）');

  document.getElementById('resultInner').innerHTML=
    '<div class="result-metrics"><div class="metric"><div class="lbl">'+(isEn?'Daily Load':'日用电量')+'</div><div class="val">'+dailyKwh.toFixed(1)+'<span class="unit">kWh</span></div></div><div class="metric"><div class="lbl">'+(isEn?'PV Capacity':'光伏装机')+'</div><div class="val">'+pvActual.toFixed(1)+'<span class="unit">kWp</span></div></div><div class="metric"><div class="lbl">'+(isEn?'Battery':'储能容量')+'</div><div class="val">'+batActual+'<span class="unit">kWh</span></div></div><div class="metric gray"><div class="lbl">'+(isEn?'Inverter':'逆变器')+'</div><div class="val">'+invKva+'<span class="unit">kVA</span></div></div></div>'+
    '<div class="section-title"><i class="ti ti-sun" style="color:#EF9F27"></i>'+(isEn?'PV Modules — ':'光伏组件 — ')+label+'</div>'+

function buildLoadCurve(ll){
  const arr=new Array(24).fill(0);
  ll.forEach(l=>{const p=(l.power*(l.qty||1))/1000;let rem=Math.max(0,Math.min(24,l.hours||0)),pos=((l.start||0)%24+24)%24,g=0;
    while(rem>1e-9&&g++<48){const h=Math.floor(pos)%24,fr=Math.min(1-(pos-Math.floor(pos)),rem);arr[h]+=p*fr;rem-=fr;pos=(Math.floor(pos)+1)%24;}});
  return arr;
}
function sinePVShape(){const arr=new Array(24).fill(0),sr=6,ss=18,D=ss-sr;let sum=0;for(let h=0;h<24;h++){const t2=h+.5;arr[h]=(t2>=sr&&t2<=ss)?Math.sin(Math.PI*(t2-sr)/D):0;sum+=arr[h];}return arr.map(v=>sum>0?v/sum:0);}
async function fetchHourlyShape(lat,lon){
  const key=lat.toFixed(2)+','+lon.toFixed(2);
  if(hourlyShapeCache[key])return hourlyShapeCache[key];
  for(const y of[2025,2024,2023]){
    try{
      const url='https://power.larc.nasa.gov/api/temporal/hourly/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude='+lon+'&latitude='+lat+'&start='+y+'0101&end='+y+'1231&format=JSON&time-standard=LST';
      const res=await fetch(url);if(!res.ok)continue;
      const data=await res.json();const obj=data&&data.properties&&data.properties.parameter&&data.properties.parameter.ALLSKY_SFC_SW_DWN;if(!obj)continue;
      const sum=new Array(24).fill(0),cnt=new Array(24).fill(0);
      for(const k in obj){const v=obj[k];if(v===null||v<=-900)continue;const hh=parseInt(k.slice(-2),10);if(hh>=0&&hh<24){sum[hh]+=v;cnt[hh]++;}}
      const avg=sum.map((s,i)=>cnt[i]>0?s/cnt[i]:0),tot=avg.reduce((a,b)=>a+b,0);if(tot<=0)continue;
      const shape=avg.map(v=>v/tot);hourlyShapeCache[key]=shape;return shape;
    }catch(e){}
  }
  return null;
}
function dispatchBattery(pv,load,cap,dod,etaRT){
  const ceil=cap,floor=cap*(1-dod),etaC=Math.sqrt(etaRT),etaD=Math.sqrt(etaRT);
  let soc=floor+cap*dod*0.5,socArr=[],batP=[],grid=[],curt=[];
  for(let iter=0;iter<6;iter++){socArr=[];batP=[];grid=[];curt=[];
    for(let h=0;h<24;h++){const net=pv[h]-load[h];let bp=0,gi=0,cu=0;
      if(net>=0){const room=ceil-soc,stored=Math.min(net*etaC,room);soc+=stored;cu=net-stored/etaC;bp=-(stored/etaC);}
      else{const need=-net,avail=soc-floor,drawn=Math.min(need/etaD,avail);soc-=drawn;gi=need-drawn*etaD;bp=drawn*etaD;}
      socArr.push(soc);batP.push(bp);grid.push(gi);curt.push(cu);}}
  return{soc:socArr,batP,grid,curt,ceil};
}

function renderSimAdvice(m){
  const curtPct=m.pvTot>0?m.curtTot/m.pvTot*100:0,gridPct=m.loadTot>0?m.gridTot/m.loadTot*100:0,directPct=m.directRatio!=null?m.directRatio*100:0;
  const tips=[];
  if(directPct>=55)tips.push('白天负荷占比高，光伏<b>直供率达 '+directPct.toFixed(0)+'%</b>：用电与发电时段高度重合，储能配置精准、成本可控，适合作为"高自用率"卖点向客户展示。');
  if(m.gridTot>0.05)tips.push('夜间/弱光存在 <b>'+m.gridTot.toFixed(1)+' kWh（占'+gridPct.toFixed(0)+'%）</b> 缺口：离网项目可建议适当加大储能；并网项目由市电补足，可强调"削峰填谷+备电"价值。');
  if(curtPct>15)tips.push('白天弃光 <b>'+m.curtTot.toFixed(1)+' kWh（'+curtPct.toFixed(0)+'%）</b>：建议客户增配电池消纳富余电量，或将可调负载（水泵/充电桩）移至正午时段。');
  if(curtPct<=15&&m.gridTot<=0.05)tips.push('光伏-储能-负载匹配良好（自用率 '+m.selfCons.toFixed(0)+'%、自给率 '+m.selfSuff.toFixed(0)+'%），无明显弃光与缺口，是向客户展示方案合理性的有力依据。');
  tips.push('按客户真实作息调整设备"起始时段"后再导出报告，曲线即客户专属方案——比纯数字报价更有说服力。');
  document.getElementById('simAdvice').innerHTML='<div class="adv-title"><i class="ti ti-bulb"></i>商务建议（内部参考）</div>'+tips.map(x=>'• '+x).join('<br>');
}

  const nightShade={id:'nightShade',beforeDraw(chart){

  simChart=new Chart(ctx,{
    type:'line',data:{labels,datasets},plugins:[nightShade],

      scales:{
        x:{grid:{display:false},border:{color:'#dfe5e1'},ticks:{font:{size:10},color:'#8a948e',maxRotation:0,autoSkip:true,maxTicksLimit:9},title:{display:true,text:isEn?'Time (h)':'时间',font:{size:10},color:'#8a948e'}},

        y1:{position:'right',min:0,max:100,border:{display:false},title:{display:true,text:'SOC %',font:{size:10},color:'#1FA978'},grid:{drawOnChartArea:false},ticks:{font:{size:10},color:'#1FA978',callback:v=>v+'%'}}

}

function b64UrlToBuffer(dataUrl){
  const b=atob(dataUrl.includes(',')?dataUrl.split(',')[1]:dataUrl);
  const buf=new Uint8Array(b.length);for(let i=0;i<b.length;i++)buf[i]=b.charCodeAt(i);return buf.buffer;
}

      [isEn?'Battery Storage':'储能电池容量',c.batActual+' kWh LFP  ('+c.batText+')'],
      [isEn?'Inverter Rating':'逆变器容量',c.invKva+' kVA ('+c.invText+')'],
      [isEn?'Annual PV Generation (est.)':'年发电量（估算）',pvYearMwh+' MWh/year'],
      [isEn?'Self-Sufficiency Rate':'用电自给率',s.selfSuff.toFixed(0)+'%'],
      [isEn?'Solar Self-Consumption Rate':'绿电自用率',s.selfCons.toFixed(0)+'%'],
      [isEn?'Annual CO₂ Reduction (est.)':'年等效减碳（估算）',s.co2t.toFixed(1)+' tonnes CO₂'],
    ];
    const ch1=[
      H1(isEn?'1. Executive Summary':'一、执行摘要'),
      P(summaryText,{after:200}),
      new Table({width:TW,borders:BORDERS,rows:[
        new TableRow({children:[hCell(isEn?'Parameter':'参数'),hCell(isEn?'Value':'数值')]}),
        ...metricsRows.map(([k,v])=>new TableRow({children:[dCell(k),dCell(v)]}))
      ]}),
      PB()
    ];

    // ========= Ch2: Load Analysis =========
    const loadRows=loads.map((l,i)=>new TableRow({children:[
      dCell(i+1),dCell(l.name),dCell(l.power),dCell(l.qty||1),
      dCell(l.start||0),dCell(l.hours),
      dCell(((l.power*(l.qty||1)*l.hours)/1000).toFixed(2))
    ]}));
    loadRows.push(new TableRow({children:[
      dCell(''),dCell(isEn?'TOTAL':'合计',{bold:true}),dCell(''),dCell(''),dCell(''),dCell(''),
      dCell(c.dailyKwh.toFixed(2),{bold:true,color:GREEN})
    ]}));
    const ch2=[
      H1(isEn?'2. Load Analysis':'二、负载分析'),
      new Table({width:TW,borders:BORDERS,rows:[
        new TableRow({children:[hCell('#'),hCell(isEn?'Device':'设备名称'),hCell(isEn?'Power(W)':'功率(W)'),hCell(isEn?'Qty':'数量'),hCell(isEn?'Start(h)':'起始时'),hCell(isEn?'Duration(h)':'时长(h)'),hCell(isEn?'Daily kWh':'日用电(kWh)')]}),
        ...loadRows
      ]}),
      PB()
    ];

    // ========= Ch3: System Design =========
    const pvDesign=[
      [isEn?'Solar Resource (PSH)':'峰值日照时数',c.psh+' h/day'],
      [isEn?'System Efficiency':'系统综合效率',(c.EFF*100).toFixed(0)+'%'],
      [isEn?'Module Specification':'组件规格',(c.panelUnit*1000).toFixed(0)+' W per module'],
      [isEn?'Module Count':'组件数量',c.pvPanels+(isEn?' pcs':' 块')],
      [isEn?'Total PV Capacity':'总装机容量',c.pvActual.toFixed(1)+' kWp'],
      [isEn?'Estimated Daily Generation':'估算日发电量',c.pv.reduce((a,b)=>a+b,0).toFixed(1)+' kWh/day'],
    ];
    const batDesign=[
      [isEn?'PV Direct Supply (daytime)':'光伏白天直供量',c.pvDirectKwh.toFixed(2)+' kWh/day ('+( c.dailyKwh>0?(c.pvDirectKwh/c.dailyKwh*100).toFixed(0):0)+'%)'],
      [isEn?'Deficit to Be Covered':'待电池覆盖缺口',c.deficitKwh.toFixed(2)+' kWh/day'],
      [isEn?'Battery Autonomy':'自给天数',c.autonomy+(isEn?' day(s)':' 天')],
      [isEn?'Total Energy Requirement':'总储能需求',c.batEnergyReq.toFixed(2)+' kWh'],
      [isEn?'Depth of Discharge (DoD)':'放电深度 DoD',(c.dod*100).toFixed(0)+'%'],
      [isEn?'Round-Trip Efficiency':'充放效率 η','95%'],
      [isEn?'Battery Configuration':'电池配置',c.batActual+' kWh  ('+c.batText+')'],
    ];
    const invDesign=[
      [isEn?'Peak Load':'峰值负载',c.peakKw.toFixed(2)+' kW'],
      [isEn?'Apparent Power Requirement':'需求视在功率',(c.peakKw/0.9).toFixed(1)+' kVA'],
      [isEn?'Inverter Configuration':'逆变器配置',c.invText],
    ];
    const ch3=[
      H1(isEn?'3. System Design':'三、系统设计'),
      H2(isEn?'3.1 PV Modules':'3.1 光伏组件'),
      new Table({width:TW,borders:BORDERS,rows:[new TableRow({children:[hCell(isEn?'Parameter':'参数'),hCell(isEn?'Value':'数值')]}), ...pvDesign.map(([k,v])=>new TableRow({children:[dCell(k),dCell(v)]}))]}),
      H2(isEn?'3.2 Battery Storage':'3.2 储能电池'),
      new Table({width:TW,borders:BORDERS,rows:[new TableRow({children:[hCell(isEn?'Parameter':'参数'),hCell(isEn?'Value':'数值')]}), ...batDesign.map(([k,v])=>new TableRow({children:[dCell(k),dCell(v)]}))]}),
      H2(isEn?'3.3 Inverter':'3.3 逆变器'),
      new Table({width:TW,borders:BORDERS,rows:[new TableRow({children:[hCell(isEn?'Parameter':'参数'),hCell(isEn?'Value':'数值')]}), ...invDesign.map(([k,v])=>new TableRow({children:[dCell(k),dCell(v)]}))]}),
      PB()
    ];

    // ========= Ch4: Energy Simulation =========
    const perfRows=[
      [isEn?'Daily PV Generation':'日均发电量',c.pv.reduce((a,b)=>a+b,0).toFixed(2)+' kWh'],
      [isEn?'Annual Generation (est.)':'年发电量（估算）',pvYearMwh+' MWh'],
      [isEn?'Self-Sufficiency Rate':'用电自给率',s.selfSuff.toFixed(0)+'%'],
      [isEn?'Self-Consumption Rate':'绿电自用率',s.selfCons.toFixed(0)+'%'],
      [isEn?'Annual CO₂ Reduction':'年减碳量',s.co2t.toFixed(1)+' t CO₂'],
      [isEn?'Data Source':'数据来源',c.shapeSrc],
    ];
    const ch4=[
      H1(isEn?'4. Energy Simulation':'四、能量模拟'),
      P(isEn?'The following chart shows the 24-hour power flow simulation for a typical annual average day, based on NASA POWER irradiance data calibrated to the designed system capacity.':'下图为基于 NASA POWER 辐照数据、按设计容量标定的典型日全天电力流动模拟曲线。',{after:160}),
      new Table({width:TW,borders:BORDERS,rows:[new TableRow({children:[hCell(isEn?'Performance Indicator':'性能指标'),hCell(isEn?'Value':'数值')]}), ...perfRows.map(([k,v])=>new TableRow({children:[dCell(k),dCell(v)]}))]}),
      new Paragraph({children:[new ImageRun({data:chartBuf,transformation:{width:580,height:242}})],alignment:AlignmentType.CENTER,spacing:{before:300,after:140}}),
      P(isEn?'Figure: 24-hour power flow (typical annual average day). Orange: PV generation; Dark blue: Load; Purple dashed: Battery charge/discharge power (negative=charging); Green dashed: Battery SOC % (right axis).':'图注：典型日24小时电力流动。橙色：光伏发电；深蓝：负载用电；紫色虚线：电池充放电功率（负值=充电）；绿色虚线：电池电量%（右轴）。',{italics:true,size:18,color:GRAY,after:0}),
      PB()
    ];

    // ========= Ch5: Commercial Proposal =========
    const priceItems=[
      [isEn?'PV Modules ('+c.pvActual.toFixed(1)+' kWp)':'光伏组件（'+c.pvActual.toFixed(1)+' kWp）',c.pvPanels,isEn?'pcs':'块'],
      [isEn?'Battery System ('+c.batActual+' kWh LFP)':'储能电池系统（'+c.batActual+' kWh LFP）','1',isEn?'set':'套'],
      [isEn?'Inverter ('+c.invKva+' kVA)':'逆变器（'+c.invKva+' kVA）','1',isEn?'set':'套'],
      [isEn?'Mounting Structure & Accessories':'组件支架及配件','1',isEn?'lot':'批'],
      [isEn?'DC & AC Cables':'直流/交流线缆','1',isEn?'lot':'批'],
      [isEn?'Monitoring System':'监控系统','1',isEn?'set':'套'],
      [isEn?'Installation & Commissioning':'安装调试','1',isEn?'lot':'批'],
      [isEn?'Civil & Foundation Works':'土建基础工程','1',isEn?'lot':'批'],
      [isEn?'Others':'其他费用','',''],
    ];
    const priceRows=[
      new TableRow({children:[hCell('#'),hCell(isEn?'Item Description':'项目名称'),hCell(isEn?'Qty':'数量'),hCell(isEn?'Unit':'单位'),hCell(isEn?'Unit Price':'单价'),hCell(isEn?'Total Price':'合价'),hCell(isEn?'Remarks':'备注')]}),
      ...priceItems.map(([name,qty,unit],idx)=>new TableRow({children:[
        dCell(idx+1,{align:AlignmentType.CENTER}),
        dCell(name),dCell(qty,{align:AlignmentType.CENTER}),dCell(unit,{align:AlignmentType.CENTER}),
        dCell(''),dCell(''),dCell('')
      ]})),
      new TableRow({children:[
        dCell('',{}),dCell(isEn?'TOTAL':'合计',{bold:true}),
        dCell(''),dCell(''),dCell(''),dCell('',{}),dCell('')
      ]})
    ];
    const signRows=[
      new TableRow({children:[hCell(isEn?'Prepared by':'编制单位'),hCell(isEn?'Reviewed by':'审核'),hCell(isEn?'Customer Confirmation':'客户确认')]}),
      emptyRow(3),
      new TableRow({children:[dCell(isEn?'Signature: ___________':'签字：___________'),dCell(isEn?'Signature: ___________':'签字：___________'),dCell(isEn?'Signature: ___________':'签字：___________')]}),
      new TableRow({children:[dCell(isEn?'Date: _______________':'日期：_______________'),dCell(isEn?'Date: _______________':'日期：_______________'),dCell(isEn?'Date: _______________':'日期：_______________')]}),
      new TableRow({children:[dCell('MIDFINE Energy'),dCell(''),dCell(customer)]})
    ];
    const ch5=[
      H1(isEn?'5. Commercial Proposal':'五、商务报价'),
      P(isEn?'The following quotation is provided for reference. All items subject to final confirmation with MIDFINE Energy.':'以下报价仅供参考，各项单价及合价请与 MIDFINE 能源销售团队确认后填写。',{after:180}),
      new Table({width:TW,borders:BORDERS,rows:priceRows}),
      new Paragraph({spacing:{before:400,after:100},children:[new TextRun({text:isEn?'* Notes:':'* 备注：',bold:true,size:20})]}),
      P(isEn?'1. Prices above are in USD unless otherwise agreed.':'1. 报价币种以双方协议为准。'),
      P(isEn?'2. Validity of this quotation: 30 days from the date of issue.':'2. 本报价有效期自出具之日起 30 天。'),
      P(isEn?'3. The above system sizes are estimated values; final design subject to site survey.':'3. 以上配置为估算值，最终方案以现场勘察结果为准。'),
      new Paragraph({spacing:{before:600,after:200},children:[new TextRun({text:isEn?'Signatures / Confirmation':'签字确认',bold:true,size:22,color:DARK})]}),
      new Table({width:TW,borders:BORDERS,rows:signRows})
    ];

    const doc=new Document({
      creator:'MIDFINE Energy',
      title:customer+' - '+(isEn?'PV & Storage Proposal':'光伏储能方案书'),
      description:'Generated by MIDFINE PV Calculator v3.1',
      sections:[{
        properties:{page:{margin:{top:1080,right:1080,bottom:1080,left:1080}}},
        children:[...coverSection,...ch1,...ch2,...ch3,...ch4,...ch5]
      }]
    });
    const blob=await Packer.toBlob(doc);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=(customer+'_PV_Proposal_'+new Date().toISOString().slice(0,10)+'.docx').replace(/[\\/:*?"<>|]/g,'_');
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(err){
    console.error(err);alert(t('exportError')+': '+err.message);
  }
  btn.disabled=false;btn.querySelector('span').textContent=t('exportBtn');
}

initCats();
initCities();
setSrc('nasa');
</script>
</body>
