<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光伏与储能配置计算器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#F5F6F8;color:#1a1a1a;font-size:14px;line-height:1.6}
  header{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
  header h1{font-size:17px;font-weight:600;color:#1a1a1a}
  header .sub{font-size:12px;color:#888;margin-left:12px}
  .main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem;display:grid;grid-template-columns:1fr 380px;gap:1.25rem;align-items:start}
  .left{display:flex;flex-direction:column;gap:1rem}
  .right{display:flex;flex-direction:column;gap:1rem;position:sticky;top:72px}
  .card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem}
  .card-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .card-title i{font-size:18px;color:#1D9E75}

  .cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
  .cat-btn{font-size:12px;padding:4px 12px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s}
  .cat-btn.active{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}
  .cat-btn:hover{border-color:#1D9E75;color:#0F6E56}

  .ap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .ap-card{border:1px solid #e8e8e8;border-radius:8px;padding:10px;cursor:pointer;transition:all .15s;background:#fafafa;user-select:none}
  .ap-card:hover{border-color:#1D9E75;background:#E1F5EE;transform:translateY(-1px)}
  .ap-card .ap-name{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.4}
  .ap-card .ap-power{font-size:11px;color:#1D9E75;margin-top:3px;font-weight:500}
  .ap-card .ap-note{font-size:10px;color:#aaa;margin-top:2px}
  .ap-card .ap-hours{font-size:10px;color:#888;margin-top:1px}

  .load-hdr{display:grid;grid-template-columns:1fr 60px 42px 52px 56px 26px;gap:5px;margin-bottom:6px;padding:0 4px}
  .load-hdr span{font-size:11px;color:#999;text-align:center}
  .load-hdr span:first-child{text-align:left}
  .load-row{display:grid;grid-template-columns:1fr 60px 42px 52px 56px 26px;gap:5px;align-items:center;padding:5px 4px;border-radius:6px}
  .load-row:hover{background:#f5f5f5}
  .load-row .dev-name{font-size:12px;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .load-row input{width:100%;font-size:12px;text-align:center;padding:3px 4px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a}
  .load-row input:focus{outline:none;border-color:#1D9E75}
  .del-btn{background:transparent;border:none;cursor:pointer;color:#ccc;font-size:15px;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px}
  .del-btn:hover{background:#FEE;color:#E24B4A}
  .empty-msg{text-align:center;color:#bbb;padding:2rem;font-size:13px}
  .daily-kwh{text-align:right;font-size:12px;color:#888;margin-top:8px;padding-top:8px;border-top:1px dashed #eee}
  .daily-kwh strong{color:#1D9E75;font-size:14px}

  .param-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  .param-item label{font-size:11px;color:#888;display:block;margin-bottom:4px}
  select{width:100%;padding:6px 8px;font-size:12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer}
  select:focus{outline:none;border-color:#1D9E75}
  input[type=text]{width:100%;padding:6px 8px;font-size:12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#1a1a1a}
  input[type=text]:focus{outline:none;border-color:#1D9E75}

  /* NASA 位置搜索区 */
  .location-box{background:#F8FFFE;border:1px solid #C5ECD9;border-radius:10px;padding:1rem;margin-bottom:.875rem}
  .location-box .loc-title{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:.625rem;display:flex;align-items:center;gap:6px}
  .search-row{display:flex;gap:6px}
  .search-row input{flex:1}
  .search-btn{padding:6px 14px;font-size:12px;background:#1D9E75;color:#fff;border:none;border-radius:6px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .search-btn:hover{background:#0F6E56}
  .search-btn:disabled{background:#aaa;cursor:not-allowed}
  .psh-result{margin-top:.75rem;font-size:12px}
  .psh-badge{display:inline-flex;align-items:center;gap:6px;background:#E1F5EE;border:1px solid #9FE1CB;border-radius:6px;padding:5px 10px;font-size:12px;color:#085041}
  .psh-badge strong{font-size:15px;color:#0F6E56}
  .psh-monthly{margin-top:8px}
  .month-bars{display:flex;gap:3px;align-items:flex-end;height:50px;margin-top:4px}
  .month-bar{flex:1;background:#1D9E75;border-radius:2px 2px 0 0;opacity:.7;position:relative;cursor:default;transition:opacity .15s}
  .month-bar:hover{opacity:1}
  .month-bar .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;display:none;margin-bottom:3px}
  .month-bar:hover .tip{display:block}
  .month-labels{display:flex;gap:3px;margin-top:2px}
  .month-labels span{flex:1;text-align:center;font-size:9px;color:#aaa}
  .loc-status{font-size:11px;color:#aaa;margin-top:5px}
  .loc-status.loading{color:#1D9E75}
  .loc-status.error{color:#E24B4A}

  .psh-source-row{display:flex;align-items:center;gap:8px;margin-bottom:.875rem;flex-wrap:wrap}
  .src-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .12s}
  .src-btn.active{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}

  .result-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
  .metric{background:#F0FBF6;border-radius:8px;padding:.875rem 1rem;border:1px solid #C5ECD9}
  .metric .lbl{font-size:11px;color:#666;margin-bottom:4px}
  .metric .val{font-size:20px;font-weight:700;color:#0F6E56}
  .metric .unit{font-size:11px;color:#888;margin-left:3px;font-weight:400}
  .metric.gray{background:#F8F8F8;border-color:#E8E8E8}
  .metric.gray .val{color:#444}
  .detail-table{width:100%;border-collapse:collapse;margin-top:.5rem}
  .detail-table td{font-size:12px;padding:5px 0;border-bottom:1px solid #F0F0F0;color:#444}
  .detail-table td:last-child{text-align:right;font-weight:500;color:#1a1a1a}
  .detail-table tr:last-child td{border:none;color:#0F6E56;font-weight:600}
  .section-title{font-size:12px;font-weight:600;color:#555;margin:10px 0 6px;display:flex;align-items:center;gap:5px}

  .calc-btn{width:100%;padding:12px;font-size:14px;font-weight:600;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .calc-btn:hover{background:#0F6E56;transform:translateY(-1px)}
  .calc-btn:active{transform:translateY(0)}

  .note{font-size:11px;color:#bbb;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #F0F0F0;line-height:1.8}
  .placeholder-result{text-align:center;padding:2rem;color:#ccc;font-size:13px}
  .nasa-tag{font-size:10px;background:#E8F4FD;color:#185FA5;border:1px solid #B5D4F4;border-radius:4px;padding:1px 6px;display:inline-block}

  /* ---- 模拟曲线 ---- */
  .sim-main{padding-top:0}
  .sim-card{grid-column:1 / -1}
  .sim-sub{font-size:11px;color:#aaa;font-weight:400;margin-left:6px}
  .sim-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
  .sim-metric{background:#F0FBF6;border:1px solid #C5ECD9;border-radius:8px;padding:.7rem .9rem}
  .sim-metric .lbl{font-size:11px;color:#666;margin-bottom:3px}
  .sim-metric .val{font-size:18px;font-weight:700;color:#0F6E56}
  .sim-metric .val .unit{font-size:11px;color:#888;margin-left:2px;font-weight:400}
  .sim-metric.warn{background:#FFF6F0;border-color:#F6C9A8}
  .sim-metric.warn .val{color:#C76A1F}
  .sim-metric.blue{background:#F0F6FD;border-color:#BAD6F5}
  .sim-metric.blue .val{color:#185FA5}
  .sim-chart-box{position:relative;height:360px;width:100%}
  .sim-advice{margin-top:1rem;background:#FAFBF8;border:1px solid #E8EDE6;border-left:3px solid #1D9E75;border-radius:8px;padding:.85rem 1rem;font-size:12.5px;line-height:1.75;color:#384038}
  .sim-advice b{color:#0F6E56}
  .sim-advice .adv-title{font-weight:600;color:#0F6E56;display:flex;align-items:center;gap:5px;margin-bottom:5px}
  .sim-loading{text-align:center;color:#1D9E75;padding:2rem;font-size:13px}
  .spin{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:700px){.sim-chart-box{height:300px}}

  @media(max-width:700px){
    .main{grid-template-columns:1fr}
    .right{position:static}
    .ap-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <h1><i class="ti ti-solar-panel" style="font-size:20px;color:#1D9E75;margin-right:8px;vertical-align:-3px"></i>光伏与储能配置计算器</h1>
    <span class="sub">v3.0 · 业务员专用工具</span>
  </div>
  <div style="font-size:12px;color:#999">双击此文件用浏览器打开即可使用</div>
</header>

<div class="main">
  <div class="left">

    <div class="card">
      <div class="card-title"><i class="ti ti-bolt"></i>选择负载设备</div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="ap-grid" id="apGrid"></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-list-details"></i>负载清单</div>
      <div id="loadEmpty" class="empty-msg"><i class="ti ti-click" style="font-size:24px;display:block;margin-bottom:8px"></i>点击上方电器卡片添加设备</div>
      <div id="loadTable" style="display:none">
        <div class="load-hdr">
          <span>设备名称</span><span>功率(W)</span><span>数量</span><span>起始(时)</span><span>时长(h)</span><span></span>
        </div>
        <div id="loadList"></div>
        <div class="daily-kwh">日用电量合计：<strong id="totalKwh">0</strong> kWh/天</div>
      </div>
    </div>

  </div>

  <div class="right">

    <div class="card">
      <div class="card-title"><i class="ti ti-adjustments-horizontal"></i>系统参数</div>

      <!-- NASA 日照查询 -->
      <div class="location-box">
        <div class="loc-title"><i class="ti ti-satellite" style="font-size:15px"></i>NASA POWER 实时日照数据</div>
        <div class="search-row">
          <input type="text" id="locInput" placeholder="输入地名，如：三亚、拉萨、内蒙古..." onkeydown="if(event.key==='Enter')fetchNASA()">
          <button class="search-btn" id="searchBtn" onclick="fetchNASA()"><i class="ti ti-search" style="font-size:13px"></i>查询</button>
        </div>
        <div id="locStatus" class="loc-status"></div>
        <div id="pshResult" style="display:none" class="psh-result">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="psh-badge"><i class="ti ti-sun" style="font-size:14px"></i>年均峰值日照 <strong id="pshVal">-</strong> h/天</div>
            <span class="nasa-tag">NASA POWER</span>
            <span id="coordInfo" style="font-size:11px;color:#aaa"></span>
          </div>
          <div class="psh-monthly" id="pshMonthly"></div>
        </div>
      </div>

      <!-- 日照来源切换 -->
      <div class="param-item" style="margin-bottom:.75rem">
        <label>峰值日照时数来源</label>
        <div class="psh-source-row" style="margin-top:4px">
          <button class="src-btn active" id="srcNasa" onclick="setSrc('nasa')"><i class="ti ti-satellite" style="font-size:12px;vertical-align:-1px"></i> NASA 数据</button>
          <button class="src-btn" id="srcManual" onclick="setSrc('manual')"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-1px"></i> 手动选择城市</button>
        </div>
        <div id="nasaPshRow" style="font-size:12px;color:#888;padding:4px 2px">请先查询地点获取 NASA 日照数据</div>
        <div id="manualPshRow" style="display:none">
          <select id="citySelect"></select>
        </div>
      </div>

      <div class="param-grid">
        <div class="param-item">
          <label>自持天数</label>
          <select id="autonomy">
            <option value="1">1天（并网+储能）</option>
            <option value="2">2天（住宅离网）</option>
            <option value="3" selected>3天（商业离网）</option>
            <option value="5">5天（偏远地区）</option>
          </select>
        </div>
        <div class="param-item">
          <label>电池类型</label>
          <select id="batType">
            <option value="0.85" selected>磷酸铁锂 DoD 85%</option>
            <option value="0.5">铅酸蓄电池 DoD 50%</option>
            <option value="0.9">三元锂 DoD 90%</option>
          </select>
        </div>
        <div class="param-item">
          <label>组件规格</label>
          <select id="panelSpec">
            <option value="0.59">590W / 块</option>
            <option value="0.615">615W / 块</option>
            <option value="0.62">620W / 块</option>
            <option value="0.63">630W / 块</option>
            <option value="0.64" selected>640W / 块</option>
            <option value="0.65">650W / 块</option>
            <option value="0.70">700W / 块</option>
            <option value="0.71">710W / 块</option>
            <option value="0.72">720W / 块</option>
            <option value="0.73">730W / 块</option>
          </select>
        </div>
        <div class="param-item">
          <label>系统效率</label>
          <select id="sysEff">
            <option value="0.75">75%（含线损/尘埃）</option>
            <option value="0.80" selected>80%（标准估算）</option>
            <option value="0.85">85%（优质安装）</option>
          </select>
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()" style="margin-top:.875rem">
        <i class="ti ti-calculator"></i>计算配置方案
      </button>
    </div>

    <div class="card" id="resultCard">
      <div class="card-title"><i class="ti ti-report-analytics"></i>配置结果</div>
      <div id="resultInner">
        <div class="placeholder-result"><i class="ti ti-arrow-up" style="font-size:20px;display:block;margin-bottom:6px"></i>填写负载后点击计算</div>
      </div>
    </div>

  </div>
</div>

<!-- ============ 全天模拟曲线 ============ -->
<div class="main sim-main">
  <div class="card sim-card" id="simCard">
    <div class="card-title">
      <i class="ti ti-chart-line"></i>全天功率平衡模拟曲线
      <span class="sim-sub" id="simSub">— 点击"计算配置方案"后生成</span>
    </div>

    <div id="simEmpty" class="placeholder-result">
      <i class="ti ti-chart-area-line" style="font-size:22px;display:block;margin-bottom:6px"></i>
      先在右侧完成配置计算，系统将按全年平均典型日生成<br>光伏发电 / 负载用电 / 电池充放电 三条曲线
    </div>

    <div id="simBody" style="display:none">
      <div id="simMetrics" class="sim-metrics"></div>
      <div class="sim-chart-box"><canvas id="simChart"></canvas></div>
      <div id="simAdvice" class="sim-advice"></div>
      <p class="note" id="simNote"></p>
    </div>
  </div>
</div>

<script>
// start = 默认起始时刻(0-23 时)，依据典型负荷曲线规范设定，可在负载清单中手动调整

/* ---- NASA POWER 查询 ---- */
async function fetchNASA() {
  const query = document.getElementById('locInput').value.trim();
  if (!query) { setStatus('请输入地名', 'error'); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setStatus('正在查询坐标...', 'loading');
  document.getElementById('pshResult').style.display = 'none';

  try {
    // Step 1: 地理编码（OpenStreetMap Nominatim）
    const geoUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&accept-language=zh`;
    const geoRes = await fetch(geoUrl, { headers: { 'User-Agent': 'PV-Calculator/3.0' } });
    const geoData = await geoRes.json();

    if (!geoData.length) {
      setStatus('未找到该地点，请尝试更详细的地名', 'error');
      btn.disabled = false;
      return;
    }

    const { lat, lon, display_name } = geoData[0];
    const latF = parseFloat(lat).toFixed(4);
    const lonF = parseFloat(lon).toFixed(4);
    nasaLocationName = query;
    nasaLat = parseFloat(latF);
    nasaLon = parseFloat(lonF);
    setStatus(`坐标：${latF}°N, ${lonF}°E · 正在请求 NASA POWER 数据...`, 'loading');

    // Step 2: NASA POWER API（年气候学数据，参数 ALLSKY_SFC_SW_DWN = kWh/m²/day ≈ PSH）
    const nasaUrl = `https://power.larc.nasa.gov/api/temporal/climatology/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude=${lonF}&latitude=${latF}&format=JSON`;
    const nasaRes = await fetch(nasaUrl);
    const nasaData = await nasaRes.json();

    const monthly = nasaData.properties.parameter.ALLSKY_SFC_SW_DWN;
    const vals = Object.entries(monthly)
      .filter(([k]) => k !== 'ANN')
      .map(([,v]) => parseFloat(v));
    const ann = parseFloat(monthly['ANN']);

    nasaPsh = parseFloat(ann.toFixed(2));
    nasaMonthly = vals;

    // 更新 UI
    document.getElementById('pshVal').textContent = nasaPsh;
    document.getElementById('coordInfo').textContent = `${latF}°N, ${lonF}°E`;
    renderMonthlyBars(vals);
    document.getElementById('pshResult').style.display = '';
    document.getElementById('nasaPshRow').innerHTML =
      `<span style="color:#0F6E56;font-weight:600">${nasaPsh} h/天</span> <span class="nasa-tag">NASA POWER · ${query}</span>`;
    setStatus('', '');

  } catch (e) {
    setStatus('查询失败，请检查网络连接后重试', 'error');
    console.error(e);
  }
  btn.disabled = false;
}

/* ---- 计算 ---- */
function calculate() {
  if (loads.length === 0) { alert('请先选择至少一个负载设备'); return; }
  const psh = getActivePsh();
  if (!psh) { alert(pshSource==='nasa' ? '请先查询 NASA 日照数据，或切换为手动选择城市' : '请选择城市'); return; }

  const autonomy  = +document.getElementById('autonomy').value;
  const dod       = +document.getElementById('batType').value;
  const panelUnit = +document.getElementById('panelSpec').value;
  const EFF       = +document.getElementById('sysEff').value;
  const BAT_EFF   = 0.95, BAT_UNIT = 5;

  const dailyKwh  = getDailyKwh();
  const pvReq     = dailyKwh / (psh * EFF);
  const pvPanels  = Math.ceil(pvReq / panelUnit);
  const pvActual  = pvPanels * panelUnit;
  const peakKw    = loads.reduce((s, l) => s + l.power * (l.qty||1), 0) / 1000;
  const invKva    = Math.ceil(peakKw / 0.9 * 10) / 10;

  // ---- 电池容量计算（只储存光伏无法直供的部分）----
  // 白天 PSH 小时内，光伏直接供电给负载（假设负载均匀分布）
  // 电池只需储存夜间 (24-PSH)/24 比例的用电量
  // 自持天数按同样逻辑：每天夜间缺口 × 天数
  const pvDirectRatio = Math.min(psh / 24, 1);
  const pvDirectKwh   = dailyKwh * pvDirectRatio;            // 光伏每日直供电量
  const nightKwh      = dailyKwh - pvDirectKwh;             // 每日夜间用电量（电池负责）
  const batEnergyReq  = nightKwh * autonomy;                 // 电池需储存的总电量
  const batReq        = batEnergyReq / (dod * BAT_EFF);     // 考虑 DoD 和效率后的电池容量
  const batUnits      = Math.ceil(batReq / BAT_UNIT);
  const batActual     = batUnits * BAT_UNIT;
  const pvSavePct     = (pvDirectRatio * 100).toFixed(0);

  const label = getActivePshLabel();
  const nasaNote = (pshSource==='nasa' && nasaMonthly)
    ? `最差月份 ${Math.min(...nasaMonthly).toFixed(1)}h/天（${MONTHS[nasaMonthly.indexOf(Math.min(...nasaMonthly))]}），最佳月份 ${Math.max(...nasaMonthly).toFixed(1)}h/天（${MONTHS[nasaMonthly.indexOf(Math.max(...nasaMonthly))]}）。` : '';

  document.getElementById('resultInner').innerHTML = `
    <div class="result-metrics">
      <div class="metric"><div class="lbl">日用电量</div><div class="val">${dailyKwh.toFixed(1)}<span class="unit">kWh</span></div></div>
      <div class="metric"><div class="lbl">光伏装机</div><div class="val">${pvActual.toFixed(1)}<span class="unit">kWp</span></div></div>
      <div class="metric"><div class="lbl">储能容量</div><div class="val">${batActual}<span class="unit">kWh</span></div></div>
      <div class="metric gray"><div class="lbl">逆变器</div><div class="val">${invKva.toFixed(1)}<span class="unit">kVA</span></div></div>
    </div>
    <div class="section-title"><i class="ti ti-sun" style="color:#EF9F27"></i>光伏组件 — ${label}</div>
    <table class="detail-table">
      <tr><td>理论最小容量</td><td>${pvReq.toFixed(2)} kWp</td></tr>
      <tr><td>系统综合效率</td><td>${(EFF*100).toFixed(0)}%</td></tr>
      <tr><td>单块组件功率</td><td>${(panelUnit*1000).toFixed(0)} W</td></tr>
      <tr><td>建议组件数量</td><td>${pvPanels} 块</td></tr>
      <tr><td>建议装机容量</td><td>${pvActual.toFixed(1)} kWp</td></tr>
    </table>
    <div class="section-title" style="margin-top:12px"><i class="ti ti-battery-charging" style="color:#1D9E75"></i>储能电池 — 能量平衡</div>
    <table class="detail-table">
      <tr><td>白天光伏直供</td><td style="color:#1D9E75">↓ ${pvDirectKwh.toFixed(2)} kWh/天（节省 ${pvSavePct}%）</td></tr>
      <tr><td>夜间电池承担</td><td>${nightKwh.toFixed(2)} kWh/天</td></tr>
      <tr><td>自持 ${autonomy} 天电池总储量</td><td>${batEnergyReq.toFixed(2)} kWh</td></tr>
      <tr><td>放电深度(DoD) × 充放效率</td><td>${(dod*100).toFixed(0)}% × ${(BAT_EFF*100).toFixed(0)}%</td></tr>
      <tr><td>理论最小电池容量</td><td>${batReq.toFixed(2)} kWh</td></tr>
      <tr><td>建议电池组数</td><td>${batUnits} 组（每组 ${BAT_UNIT} kWh）</td></tr>
      <tr><td>建议储能容量</td><td>${batActual} kWh</td></tr>
    </table>
    <p class="note">峰值负载 ${peakKw.toFixed(2)} kW，建议逆变器 ≥ ${invKva} kVA。${nasaNote}以上为估算值，实际工程请结合厂商规格复核。</p>
  `;

  // 保存结果供曲线模块使用，并生成全天模拟曲线
  lastCalc = {
    psh, EFF, dod, autonomy,
    pvActual, batActual, invKva,
    dailyKwh, peakKw,
    dailyPvEnergy: pvActual * psh * EFF,   // 全天光伏发电量 kWh = kWp × PSH × η
    BAT_RT: 0.95                            // 电池往返效率
  };
  generateSimulation(true);
}

/* ==================== 全天模拟曲线引擎 ==================== */

/* 负载逐时曲线：每台设备在 [start, start+hours) 区间按小时重叠分摊（环绕跨午夜），
   返回 24 个小时平均功率 kW。能量守恒：Σ(P_h×1h)=Σ(功率×台数×时长)。 */
function buildLoadCurve(loadList) {
  const arr = new Array(24).fill(0);
  loadList.forEach(l => {
    const p = (l.power * (l.qty || 1)) / 1000;        // 运行时功率 kW
    let remaining = Math.max(0, Math.min(24, l.hours || 0));
    let pos = ((l.start || 0) % 24 + 24) % 24;
    let guard = 0;
    while (remaining > 1e-9 && guard++ < 48) {
      const h = Math.floor(pos) % 24;
      const frac = Math.min(1 - (pos - Math.floor(pos)), remaining); // 本小时覆盖比例
      arr[h] += p * frac;                              // kWh 贡献 = 小时平均功率
      remaining -= frac;
      pos = (Math.floor(pos) + 1) % 24;
    }
  });
  return arr;
}

/* 理论晴空正弦半波（6:00-18:00），归一化为占比，Σ=1。NASA 逐时不可用时回退 */
function sinePVShape() {
  const arr = new Array(24).fill(0);
  const sr = 6, ss = 18, D = ss - sr;
  let sum = 0;
  for (let h = 0; h < 24; h++) {
    const t = h + 0.5;
    let v = (t >= sr && t <= ss) ? Math.sin(Math.PI * (t - sr) / D) : 0;
    arr[h] = v; sum += v;
  }
  return arr.map(v => sum > 0 ? v / sum : 0);
}

/* NASA POWER 逐时辐照 → 全年平均日内形状（24 个归一化占比）。失败返回 null */
async function fetchHourlyShape(lat, lon) {
  const key = lat.toFixed(2) + ',' + lon.toFixed(2);
  if (hourlyShapeCache[key]) return hourlyShapeCache[key];
  const years = [2025, 2024, 2023];
  for (const y of years) {
    try {
      const url = `https://power.larc.nasa.gov/api/temporal/hourly/point?parameters=ALLSKY_SFC_SW_DWN&community=RE&longitude=${lon}&latitude=${lat}&start=${y}0101&end=${y}1231&format=JSON&time-standard=LST`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const obj = data && data.properties && data.properties.parameter && data.properties.parameter.ALLSKY_SFC_SW_DWN;
      if (!obj) continue;
      const sum = new Array(24).fill(0), cnt = new Array(24).fill(0);
      for (const k in obj) {
        const v = obj[k];
        if (v === null || v <= -900) continue;          // 过滤填充值
        const hh = parseInt(k.slice(-2), 10);
        if (hh >= 0 && hh < 24) { sum[hh] += v; cnt[hh]++; }
      }
      const avg = sum.map((s, i) => cnt[i] > 0 ? s / cnt[i] : 0);
      const tot = avg.reduce((a, b) => a + b, 0);
      if (tot <= 0) continue;
      const shape = avg.map(v => v / tot);
      hourlyShapeCache[key] = shape;
      return shape;
    } catch (e) { /* 试下一年 */ }
  }
  return null;
}

/* 电池逐时调度（能量平衡）：盈余充电(×√η)，亏缺放电(÷√η)，越界则弃光/市电补充。
   迭代多轮使 SOC 周期自洽（昼充夜放）。SOC 以标称容量为参考，下限 (1-DoD)。 */
function dispatchBattery(pv, load, capNameplate, dod, etaRT) {
  const ceil = capNameplate;
  const floor = capNameplate * (1 - dod);
  const usable = capNameplate * dod;
  const etaC = Math.sqrt(etaRT), etaD = Math.sqrt(etaRT);
  let soc = floor + usable * 0.5;
  let socArr = [], batP = [], grid = [], curt = [];
  for (let iter = 0; iter < 6; iter++) {
    socArr = []; batP = []; grid = []; curt = [];
    for (let h = 0; h < 24; h++) {
      const net = pv[h] - load[h];                      // kWh（1h 内）
      let bp = 0, gi = 0, cu = 0;
      if (net >= 0) {
        const room = ceil - soc;
        const stored = Math.min(net * etaC, room);
        soc += stored;
        cu = net - stored / etaC;                        // 弃光
        bp = -(stored / etaC);                           // 充电(负)
      } else {
        const need = -net;
        const avail = soc - floor;
        const drawn = Math.min(need / etaD, avail);
        soc -= drawn;
        const delivered = drawn * etaD;
        gi = need - delivered;                            // 缺口/市电补充
        bp = delivered;                                  // 放电(正)
      }
      socArr.push(soc); batP.push(bp); grid.push(gi); curt.push(cu);
    }
  }
  return { soc: socArr, batP, grid, curt, ceil };
}

/* 主流程 */
async function generateSimulation(refetch) {
  if (!lastCalc) return;
  const body = document.getElementById('simBody');
  const empty = document.getElementById('simEmpty');
  const sub = document.getElementById('simSub');

  const load = buildLoadCurve(loads);

  let shape = null, shapeSrc = '';
  if (pshSource === 'nasa' && nasaLat != null && nasaLon != null) {
    const key = nasaLat.toFixed(2) + ',' + nasaLon.toFixed(2);
    if (refetch || !hourlyShapeCache[key]) {
      empty.style.display = '';
      empty.innerHTML = '<div class="sim-loading"><i class="ti ti-loader-2 spin"></i> 正在获取 NASA POWER 逐时辐照数据，合成全年平均日内曲线…（首次约数秒）</div>';
      body.style.display = 'none';
    }
    shape = await fetchHourlyShape(nasaLat, nasaLon);
    if (shape) shapeSrc = `NASA POWER 逐时真实数据 · 全年平均（${nasaLocationName}）`;
  }
  if (!shape) {
    shape = sinePVShape();
    shapeSrc = (pshSource === 'nasa')
      ? '理论晴空正弦模型（NASA 逐时暂不可用，已回退）'
      : '理论晴空正弦模型（手动城市模式）';
  }

  const E = lastCalc.dailyPvEnergy;                      // kWh = kWp×PSH×η
  const pv = shape.map(f => f * E);

  const disp = dispatchBattery(pv, load, lastCalc.batActual, lastCalc.dod, lastCalc.BAT_RT);
  const socPct = disp.soc.map(s => s / disp.ceil * 100);

  const pvTot = pv.reduce((a, b) => a + b, 0);
  const curtTot = disp.curt.reduce((a, b) => a + b, 0);
  const loadTot = load.reduce((a, b) => a + b, 0);
  const gridTot = disp.grid.reduce((a, b) => a + b, 0);
  const selfCons = pvTot > 0 ? (pvTot - curtTot) / pvTot * 100 : 0;
  const selfSuff = loadTot > 0 ? (loadTot - gridTot) / loadTot * 100 : 0;
  const peakPv = Math.max(...pv), peakLoad = Math.max(...load);

  renderSimMetrics({ selfCons, selfSuff, pvTot, curtTot, gridTot, loadTot, peakPv, peakLoad });
  renderSimAdvice({ selfCons, selfSuff, curtTot, gridTot, pvTot, loadTot, peakPv, peakLoad });
  document.getElementById('simNote').textContent =
    `数据源：${shapeSrc}；曲线幅值按年均 PSH=${lastCalc.psh}h、系统效率 ${(lastCalc.EFF*100).toFixed(0)}% 标定，与配置计算口径一致。分辨率 1 小时（本地太阳时 LST）。为全年平均典型日，单日实际受云量与季节影响会有偏差。`;
  sub.textContent = `— ${shapeSrc}`;

  renderSimChart(pv, load, disp.batP, socPct, disp.grid);
  empty.style.display = 'none';
  body.style.display = '';
}
function regenSimulation(refetch) { generateSimulation(refetch); }

function renderSimMetrics(m) {
  const cur = m.curtTot > 0.05, off = m.gridTot > 0.05;
  document.getElementById('simMetrics').innerHTML = `
    <div class="sim-metric"><div class="lbl">自发自用率</div><div class="val">${m.selfCons.toFixed(0)}<span class="unit">%</span></div></div>
    <div class="sim-metric"><div class="lbl">负载自给率</div><div class="val">${m.selfSuff.toFixed(0)}<span class="unit">%</span></div></div>
    <div class="sim-metric blue"><div class="lbl">光伏日发电</div><div class="val">${m.pvTot.toFixed(1)}<span class="unit">kWh</span></div></div>
    <div class="sim-metric ${cur ? 'warn' : ''}"><div class="lbl">弃光电量</div><div class="val">${m.curtTot.toFixed(1)}<span class="unit">kWh</span></div></div>
    <div class="sim-metric ${off ? 'warn' : ''}"><div class="lbl">缺口/市电补充</div><div class="val">${m.gridTot.toFixed(1)}<span class="unit">kWh</span></div></div>
    <div class="sim-metric"><div class="lbl">光伏峰值出力</div><div class="val">${m.peakPv.toFixed(1)}<span class="unit">kW</span></div></div>`;
}

function renderSimAdvice(m) {
  const tips = [];
  const curtPct = m.pvTot > 0 ? m.curtTot / m.pvTot * 100 : 0;
  const gridPct = m.loadTot > 0 ? m.gridTot / m.loadTot * 100 : 0;
  if (m.gridTot > 0.05)
    tips.push(`夜间/弱光时段存在 <b>${m.gridTot.toFixed(1)} kWh（占负载 ${gridPct.toFixed(0)}%）</b> 缺口：离网项目说明电池或组件偏小，可向客户提一档更大储能；并网项目由市电补足，正好作为"自发自用+削峰"卖点。`);
  if (curtPct > 15)
    tips.push(`白天弃光 <b>${m.curtTot.toFixed(1)} kWh（占发电 ${curtPct.toFixed(0)}%）</b>：储能装不下富余电——推荐客户增配电池可直接提升自用率与回报；或把可调负载（水泵/充电/制冷蓄冷）移到正午消纳。`);
  if (curtPct <= 15 && m.gridTot <= 0.05)
    tips.push(`光伏-储能-负载三者匹配良好（自用率 ${m.selfCons.toFixed(0)}%、自给率 ${m.selfSuff.toFixed(0)}%），无明显弃光与缺口，是向客户证明"配置不浪费、不缺电"的有力图表。`);
  tips.push(`按客户真实作息微调各设备"起始时段"后再出图，曲线即客户专属——比单一报价数字更有说服力，建议随技术方案一并发送。`);
  document.getElementById('simAdvice').innerHTML =
    `<div class="adv-title"><i class="ti ti-bulb"></i>商务建议（B2B）</div>` + tips.map(t => `• ${t}`).join('<br>');
}

function renderSimChart(pv, load, batP, socPct, grid) {
  const ctx = document.getElementById('simChart').getContext('2d');
  if (simChart) simChart.destroy();
  const labels = Array.from({ length: 24 }, (_, h) => h + ':00');
  simChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '光伏发电 (kW)', data: pv, borderColor: '#EF9F27', backgroundColor: 'rgba(239,159,39,0.15)', fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2, yAxisID: 'y' },
        { label: '负载用电 (kW)', data: load, borderColor: '#E24B4A', fill: false, stepped: true, pointRadius: 0, borderWidth: 2, yAxisID: 'y' },
        { label: '电池放电(+)/充电(−) (kW)', data: batP, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.10)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.8, yAxisID: 'y' },
        { label: '电池 SOC (%)', data: socPct, borderColor: '#185FA5', borderDash: [5, 4], fill: false, tension: 0.3, pointRadius: 0, borderWidth: 1.5, yAxisID: 'y1' },
        { label: '市电/缺口补充 (kW)', data: grid, borderColor: '#9aa0a6', backgroundColor: 'rgba(154,160,166,0.25)', fill: true, stepped: true, pointRadius: 0, borderWidth: 1, yAxisID: 'y' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { boxWidth: 12, font: { size: 11 }, padding: 10, usePointStyle: true } },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y.toFixed(2)}` } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 13 }, title: { display: true, text: '时刻（本地太阳时 LST）', font: { size: 11 } } },
        y: { position: 'left', beginAtZero: true, title: { display: true, text: '功率 kW', font: { size: 11 } }, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } },
        y1: { position: 'right', min: 0, max: 100, title: { display: true, text: 'SOC %', font: { size: 11 } }, grid: { drawOnChartArea: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

initCats();
initCities();
setSrc('nasa');
</script>
